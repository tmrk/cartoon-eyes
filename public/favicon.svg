<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- The About-section eye (scleraWidth 92, scleraHeight 72, irisSize 72,
       pupilSize 45, lidSize 12), rendered at rest with an ink outline so it
       stays visible on light tab bars -->
  <defs>
    <mask id="m">
      <ellipse fill="#ffffff" cx="50" cy="50" rx="46" ry="36"/>
    </mask>
  </defs>
  <ellipse fill="#ffffff" stroke="#29223A" stroke-width="5" cx="50" cy="50" rx="46" ry="36"/>
  <g mask="url(#m)">
    <ellipse fill="#FF5D3A" cx="50" cy="50" rx="25.92" ry="25.92"/>
    <ellipse fill="#000000" cx="50" cy="50" rx="11.664" ry="11.664"/>
    <rect fill="#29223A" x="0" y="-17.68" width="100" height="36"/>
    <rect fill="#29223A" x="0" y="81.68" width="100" height="36"/>
  </g>
</svg>
